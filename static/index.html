<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Travel Buddy · bunq</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300C896'/><text x='16' y='22' font-family='sans-serif' font-weight='bold' font-size='16' fill='%23fff' text-anchor='middle'>b</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════ */
    :root {
      --bg:          #ECF1F7;
      --bg-card:     #FFFFFF;
      --accent:      #00C896;
      --accent-dk:   #009E76;
      --accent-dim:  rgba(0,200,150,.1);
      --amber:       #F5A623;
      --amber-dim:   rgba(245,166,35,.12);
      --red:         #FF6060;
      --red-dim:     rgba(255,96,96,.1);
      --violet:      #7C5FD4;
      --text:        #0F1923;
      --text-sec:    #637181;
      --text-dim:    #99ACC0;
      --border:      rgba(15,25,35,.07);
      --mono:        'DM Mono', monospace;
      --ui:          'Plus Jakarta Sans', sans-serif;
      --r:           18px;
      --r-sm:        12px;
      --r-pill:      100px;
      --sh:          0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06);
      --sh-up:       0 2px 4px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.09);
      --sh-btn:      0 4px 18px rgba(0,200,150,.38);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }

    body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ═══ APP SHELL ═══ */
    #app {
      max-width: 430px; margin: 0 auto;
      height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ═══ HEADER ═══ */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    .wordmark {
      font-size: 17px; font-weight: 800; letter-spacing: -.4px;
      color: var(--text);
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .header-trip {
      font-size: 12px; font-weight: 600; color: var(--text-sec);
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bunq-badge {
      font-size: 12px; font-weight: 800; letter-spacing: .03em;
      background: var(--accent); color: #fff;
      padding: 5px 12px; border-radius: var(--r-pill);
    }

    /* ═══ SCREENS ═══ */
    .screen {
      display: none; flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 16px 84px;
      flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .screen.active { display: flex; }

    /* ═══ BOTTOM NAV ═══ */
    #nav {
      display: flex; flex-shrink: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      position: relative; z-index: 10;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 6px 0;
      font-family: var(--ui); font-size: 10px; font-weight: 700; letter-spacing: .04em;
      color: var(--text-dim); text-transform: uppercase;
      transition: color .2s;
    }
    .nav-tab svg { width: 22px; height: 22px; transition: transform .2s; }
    .nav-tab.active { color: var(--accent); }
    .nav-tab.active svg { transform: scale(1.1); }

    /* ═══ MODE TABS ═══ */
    .mode-tabs {
      display: flex; background: #DDE5EF; border-radius: var(--r-pill);
      padding: 4px; gap: 2px;
    }
    .mode-tab {
      flex: 1; padding: 10px 0; border: none; background: none; cursor: pointer;
      font-family: var(--ui); font-size: 13px; font-weight: 700;
      color: var(--text-sec); border-radius: var(--r-pill);
      transition: all .18s; letter-spacing: .01em;
    }
    .mode-tab.active {
      background: var(--bg-card); color: var(--text);
      box-shadow: 0 2px 10px rgba(0,0,0,.13);
    }

    /* ═══ VIEWFINDER ═══ */
    .viewfinder {
      position: relative; border-radius: var(--r);
      background: #1A2535; overflow: hidden;
      aspect-ratio: 4/3;
      box-shadow: var(--sh-up);
      flex-shrink: 0;
    }
    #camera-video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0; transition: opacity .3s;
    }
    #camera-video.live { opacity: 1; }

    /* Ring pulse instead of corner brackets */
    .vf-ring {
      position: absolute; inset: 18px;
      border-radius: calc(var(--r) - 4px);
      border: 2px solid rgba(0,200,150,.55);
      pointer-events: none;
      animation: ring-pulse 2.6s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { opacity:.35; transform:scale(1); border-color:rgba(0,200,150,.4); }
      50%      { opacity:1;   transform:scale(1.008); border-color:rgba(0,200,150,.85); }
    }
    .vf-status {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-family: var(--ui); font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      background: rgba(15,25,35,.72); color: #fff;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      padding: 5px 16px; border-radius: var(--r-pill);
      pointer-events: none; white-space: nowrap;
      transition: background .2s;
    }
    .vf-status.live { background: var(--accent); }
    .vf-preview {
      position: absolute; inset: 0; border-radius: inherit; overflow: hidden;
    }
    .vf-preview img { width: 100%; height: 100%; object-fit: cover; }
    .vf-input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    /* Voice idle state */
    .vf-voice {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: linear-gradient(160deg, #1A2535 0%, #243349 100%);
    }
    .vf-voice svg { width: 52px; height: 52px; color: rgba(255,255,255,.25); }
    .rec-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--red); animation: rec-blink .9s step-end infinite;
    }
    @keyframes rec-blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .rec-timer {
      font-family: var(--mono); font-size: 15px; color: #fff; letter-spacing: .12em;
    }

    /* ═══ BUTTONS ═══ */
    .cta-btn {
      width: 100%; padding: 16px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r-pill); cursor: pointer;
      font-family: var(--ui); font-size: 15px; font-weight: 700;
      box-shadow: var(--sh-btn);
      transition: transform .14s, box-shadow .14s, background .15s;
      flex-shrink: 0;
    }
    .cta-btn:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(0,200,150,.28); }
    .cta-btn:disabled { background: #C8D6E2; color: #8FA3B7; box-shadow: none; cursor: default; transform: none; }
    .cta-btn.amber { background: var(--amber); box-shadow: 0 4px 16px rgba(245,166,35,.38); }

    .ghost-btn {
      background: none; border: 1.5px solid var(--border); border-radius: var(--r-pill);
      cursor: pointer; padding: 13px 24px;
      font-family: var(--ui); font-size: 14px; font-weight: 600; color: var(--text-sec);
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    .ghost-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ghost-btn.full { width: 100%; }

    #upload-alt-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--ui); font-size: 13px; font-weight: 600;
      color: var(--text-sec); text-decoration: underline; text-underline-offset: 3px;
      padding: 2px 0; text-align: center; flex-shrink: 0;
    }
    #upload-alt-btn:hover { color: var(--accent); }

    /* ═══ RESULT PANELS ═══ */
    .result-panel {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh-up); padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      border-left: 4px solid var(--accent);
      animation: fadeUp .22s ease;
    }
    .result-original {
      font-family: var(--mono); font-size: 12px; color: var(--text-dim);
    }
    .result-eur {
      font-family: var(--mono); font-size: 38px; font-weight: 500;
      color: var(--text); letter-spacing: -.5px; line-height: 1.1;
    }
    .result-meta { font-size: 12px; color: var(--text-sec); font-weight: 500; }
    .result-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
      background: var(--accent-dim); color: var(--accent-dk);
      padding: 5px 14px; border-radius: var(--r-pill);
    }
    .error-panel {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh); padding: 16px;
      color: var(--red); font-size: 13px; font-weight: 600;
      border-left: 4px solid var(--red); animation: fadeUp .22s ease;
    }

    /* ═══ MENU PANEL ═══ */
    .menu-panel {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh-up); overflow: hidden; animation: fadeUp .22s ease;
    }
    .menu-panel-header {
      padding: 13px 16px; font-size: 11px; font-weight: 700; letter-spacing: .09em;
      color: var(--text-sec); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--accent-dim), transparent);
    }
    .menu-table { width: 100%; border-collapse: collapse; }
    .menu-table thead th {
      padding: 9px 12px; font-size: 10px; font-weight: 700; letter-spacing: .1em;
      color: var(--text-dim); text-transform: uppercase; text-align: left;
      border-bottom: 1px solid var(--border); background: #F7FAFB;
    }
    .menu-table tbody tr { border-bottom: 1px solid var(--border); }
    .menu-table tbody tr:last-child { border-bottom: none; }
    .menu-table tbody td { padding: 10px 12px; vertical-align: top; }
    .td-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .td-orig { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .td-price { font-family: var(--mono); font-size: 12px; color: var(--text-sec); white-space: nowrap; }
    .td-eur   { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent-dk); white-space: nowrap; }

    /* ═══ CURRENCY PICKER ═══ */
    .ccy-picker {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh-up); padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp .22s ease;
    }
    .ccy-picker-transcript { font-size: 13px; color: var(--text-sec); font-style: italic; }
    .ccy-picker-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--text-dim); text-transform: uppercase; }
    .ccy-picker-amount { font-family: var(--mono); font-size: 30px; font-weight: 500; color: var(--text); }
    .ccy-picker-row { display: flex; gap: 8px; }

    /* ═══ DASHBOARD ═══ */
    .dash-hero {
      background: linear-gradient(145deg, #00C896 0%, #00A07A 55%, #007A5C 100%);
      border-radius: var(--r); padding: 22px 20px 18px;
      position: relative; overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,200,150,.32);
    }
    /* Decorative circles */
    .dash-hero::before {
      content: ''; position: absolute;
      top: -50px; right: -30px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.08); pointer-events: none;
    }
    .dash-hero::after {
      content: ''; position: absolute;
      bottom: -70px; left: -30px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(255,255,255,.05); pointer-events: none;
    }
    .mission-title {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      color: rgba(255,255,255,.65); text-transform: uppercase;
      margin-bottom: 3px; position: relative; z-index: 1;
    }
    .mission-name-row {
      position: relative; z-index: 1; margin-bottom: 18px;
    }
    #mission-name {
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: -.2px; line-height: 1.2;
    }

    /* Gauge — lives inside hero on white inner card */
    .gauge-card {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 14px; padding: 16px;
      position: relative; z-index: 1;
    }
    .gauge-wrap {
      display: flex; justify-content: center; padding-bottom: 4px;
    }
    .gauge-svg-wrap {
      position: relative; width: 148px; height: 148px;
    }
    .gauge-svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .g-track {
      fill: none; stroke: rgba(255,255,255,.2);
      stroke-width: 10; stroke-linecap: round;
    }
    .g-arc {
      fill: none; stroke: #fff;
      stroke-width: 10; stroke-linecap: round;
      stroke-dasharray: 490.09; stroke-dashoffset: 0;
      transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), stroke .5s;
    }
    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .gauge-pct {
      font-family: var(--mono); font-size: 12px;
      color: rgba(255,255,255,.7); letter-spacing: .06em;
    }
    .gauge-amt {
      font-family: var(--mono); font-size: 20px; font-weight: 500;
      color: #fff; letter-spacing: -.3px; line-height: 1.15;
    }
    .gauge-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      color: rgba(255,255,255,.6); text-transform: uppercase;
    }

    /* Stat pills — inside hero */
    .stat-pills {
      display: flex; gap: 8px; margin-top: 12px;
      position: relative; z-index: 1;
    }
    .stat-pill {
      flex: 1; background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px; padding: 11px 13px;
    }
    .stat-pill-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: .1em;
      color: rgba(255,255,255,.6); text-transform: uppercase; margin-bottom: 4px;
    }
    .stat-pill-val {
      font-family: var(--mono); font-size: 14px; font-weight: 500; color: #fff;
    }

    /* Currency toggle */
    .ccy-toggle {
      display: flex; background: var(--bg-card); border-radius: var(--r-pill);
      padding: 4px; box-shadow: var(--sh);
    }
    .ccy-btn {
      flex: 1; background: none; border: none; border-radius: var(--r-pill);
      padding: 10px; font-family: var(--ui); font-size: 13px; font-weight: 700;
      color: var(--text-sec); cursor: pointer; transition: all .18s;
    }
    .ccy-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(0,200,150,.32);
    }
    .ccy-rate-row {
      font-family: var(--mono); font-size: 11px; color: var(--text-dim);
      text-align: center; letter-spacing: .05em;
    }

    /* Payment section */
    .payment-section {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh); overflow: hidden;
    }
    .payment-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .payment-hdr-lbl {
      font-size: 12px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-sec); text-transform: uppercase;
    }
    .refresh-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--text-dim); line-height: 1;
      padding: 4px; transition: color .2s; display: flex; align-items: center;
    }
    .refresh-btn:hover { color: var(--accent); }
    .refresh-btn.spin { animation: spin .5s linear; }
    .payment-list { display: flex; flex-direction: column; max-height: 280px; overflow-y: auto; }
    .pay-empty {
      padding: 24px; text-align: center;
      font-size: 13px; color: var(--text-dim);
    }
    .pay-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .pay-row:last-child { border-bottom: none; }
    /* Left color dot */
    .pay-row::before {
      content: ''; display: block;
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .pay-date {
      font-family: var(--mono); font-size: 10px; color: var(--text-dim);
      min-width: 44px; letter-spacing: .03em;
    }
    .pay-desc {
      flex: 1; font-size: 13px; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pay-amt {
      font-family: var(--mono); font-size: 13px; font-weight: 500; white-space: nowrap;
    }
    .pay-amt.db { color: var(--red); }
    .pay-amt.cr { color: var(--accent-dk); }

    /* AI Recommendations */
    .recs-section {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh); overflow: hidden;
    }
    .recs-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .recs-hdr-left { display: flex; flex-direction: column; gap: 2px; }
    .recs-hdr-lbl {
      font-size: 12px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-sec); text-transform: uppercase;
    }
    .recs-geo-note { font-size: 11px; color: var(--accent); font-weight: 500; }
    #recs-list {
      max-height: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column;
    }
    #recs-list::-webkit-scrollbar { display: none; }
    .rec-card {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 5px;
    }
    .rec-card:last-child { border-bottom: none; }
    .rec-name-row {
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    }
    .rec-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .rec-dist { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
    .rec-meta { font-size: 11px; color: var(--amber); font-weight: 600; }
    .rec-why  { font-size: 13px; color: var(--text-sec); line-height: 1.55; }
    .rec-address { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rec-maps-link {
      display: inline-flex; align-items: center; margin-top: 2px; align-self: flex-start;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
      color: var(--accent-dk); text-decoration: none;
      padding: 5px 12px; border-radius: var(--r-pill);
      background: var(--accent-dim);
    }
    .rec-maps-link:hover { background: rgba(0,200,150,.18); }

    /* Events */
    .events-section {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh); overflow: hidden;
    }
    .events-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .events-hdr-lbl {
      font-size: 12px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-sec); text-transform: uppercase;
    }
    .events-list { display: flex; flex-direction: column; }
    #recs-list    { display: flex; flex-direction: column; }
    .event-card {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      text-decoration: none; transition: background .15s; cursor: pointer;
    }
    .event-card:last-child { border-bottom: none; }
    .event-card:hover { background: rgba(0,200,150,.04); }
    .event-img {
      width: 50px; height: 50px; flex-shrink: 0;
      border-radius: 10px; object-fit: cover; background: var(--bg);
    }
    .event-img-placeholder {
      width: 50px; height: 50px; flex-shrink: 0; border-radius: 10px;
      background: var(--bg); display: flex; align-items: center;
      justify-content: center; font-size: 22px;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px;
    }
    .event-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 1px; }
    .event-venue {
      font-size: 11px; color: var(--text-sec);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .event-price {
      font-family: var(--mono); font-size: 12px; color: var(--amber);
      white-space: nowrap; flex-shrink: 0;
    }
    .events-find-btn {
      width: 100%; padding: 20px; background: none; border: none;
      font-family: var(--ui); font-size: 13px; font-weight: 600;
      color: var(--text-sec); cursor: pointer; transition: color .2s;
    }
    .events-find-btn:hover { color: var(--accent); }
    .events-empty {
      padding: 24px; text-align: center; font-size: 13px; color: var(--text-dim);
    }

    /* ═══ TRIPS ═══ */
    .section-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      color: var(--text-dim); text-transform: uppercase;
    }
    .trip-list { display: flex; flex-direction: column; gap: 10px; }
    .trip-card {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 16px 16px 16px 20px;
      border-left: 4px solid rgba(0,200,150,.2);
      cursor: pointer; transition: all .18s; position: relative;
    }
    .trip-card:hover { transform: translateY(-1px); box-shadow: var(--sh-up); }
    .trip-card:active { transform: scale(.99); }
    .trip-card.active {
      border-left-color: var(--accent);
      background: linear-gradient(120deg, rgba(0,200,150,.06) 0%, #fff 70%);
    }
    .trip-card-name {
      font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px;
    }
    .trip-card-meta { font-size: 12px; color: var(--text-sec); margin-bottom: 5px; }
    .trip-card-budget {
      font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent-dk);
    }
    .trip-active-pill {
      position: absolute; top: 14px; right: 14px;
      font-size: 10px; font-weight: 700; letter-spacing: .06em;
      background: var(--accent); color: #fff;
      padding: 4px 12px; border-radius: var(--r-pill);
    }

    .new-mission-btn {
      width: 100%; padding: 18px;
      background: none; border: 2px dashed rgba(0,200,150,.3); border-radius: var(--r);
      font-family: var(--ui); font-size: 14px; font-weight: 700; color: var(--accent);
      cursor: pointer; transition: all .18s;
    }
    .new-mission-btn:hover { background: var(--accent-dim); border-color: var(--accent); }

    /* Trip form */
    .trip-form {
      background: var(--bg-card); border-radius: var(--r);
      box-shadow: var(--sh-up); padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      animation: fadeUp .2s ease;
    }
    .form-title {
      font-size: 16px; font-weight: 800; color: var(--text);
    }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-field { flex: 1; }
    .rf-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-dim); text-transform: uppercase;
    }
    .rf-input {
      width: 100%; background: var(--bg); border: 1.5px solid rgba(0,0,0,.08);
      border-radius: var(--r-sm); padding: 11px 14px;
      color: var(--text); font-family: var(--ui); font-size: 14px; font-weight: 500;
      outline: none; transition: border-color .18s, background .18s;
    }
    .rf-input:focus { border-color: var(--accent); background: #fff; }
    .rf-input::placeholder { color: var(--text-dim); }
    .rf-input[type="date"] { color-scheme: light; }
    .form-actions { display: flex; gap: 10px; margin-top: 2px; }
    .form-actions .ghost-btn { flex: 1; text-align: center; }
    .form-actions .cta-btn  { flex: 2; padding: 14px; font-size: 14px; }

    /* Skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, #E4EAF1 25%, #EEF3F8 50%, #E4EAF1 75%);
      background-size: 600px 100%; border-radius: 8px; height: 14px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: -300px 0; }
      100% { background-position:  300px 0; }
    }

    /* Animations */
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════ HEADER ══════════ -->
  <header id="header">
    <div class="wordmark">Travel<em>Buddy</em></div>
    <div class="header-trip" id="header-trip">No trip selected</div>
    <div class="bunq-badge">bunq</div>
  </header>

  <!-- ══════════ SCREEN: SCANNER ══════════ -->
  <div id="screen-scanner" class="screen active">

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="photo">Photo</button>
      <button class="mode-tab" data-mode="voice">Voice</button>
      <button class="mode-tab" data-mode="menu">Menu</button>
    </div>

    <div class="viewfinder" id="viewfinder">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="vf-ring"></div>
      <div class="vf-status" id="vf-status">Ready</div>
      <div class="vf-preview" id="vf-preview"></div>
      <input type="file" class="vf-input" id="file-input" accept="image/*">
    </div>

    <button class="cta-btn" id="scan-btn">Scan Price</button>
    <button id="upload-alt-btn" style="display:none">or upload image</button>
    <div id="result-area"></div>

  </div>

  <!-- ══════════ SCREEN: DASHBOARD ══════════ -->
  <div id="screen-dashboard" class="screen">

    <div class="dash-hero">
      <div class="mission-title">Active Journey</div>
      <div class="mission-name-row">
        <span id="mission-name">—</span>
      </div>

      <div class="gauge-card">
        <div class="gauge-wrap">
          <div class="gauge-svg-wrap">
            <svg class="gauge-svg" viewBox="0 0 200 200">
              <circle class="g-track" cx="100" cy="100" r="78"/>
              <circle class="g-arc"   id="g-arc"   cx="100" cy="100" r="78"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-pct" id="gauge-pct">—%</div>
              <div class="gauge-amt" id="gauge-amt">—</div>
              <div class="gauge-lbl">Remaining</div>
            </div>
          </div>
        </div>

        <div class="stat-pills">
          <div class="stat-pill">
            <div class="stat-pill-lbl">Total Budget</div>
            <div class="stat-pill-val" id="stat-budget">—</div>
          </div>
          <div class="stat-pill">
            <div class="stat-pill-lbl">Per Day Left</div>
            <div class="stat-pill-val" id="stat-per-day">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="ccy-toggle" id="ccy-toggle" style="display:none">
      <button class="ccy-btn active" id="ccy-own-btn">EUR</button>
      <button class="ccy-btn"        id="ccy-dest-btn">—</button>
    </div>
    <div class="ccy-rate-row" id="ccy-rate" style="display:none"></div>

    <div class="payment-section">
      <div class="payment-hdr">
        <span class="payment-hdr-lbl">Payment Log</span>
        <button class="refresh-btn" id="refresh-btn" title="Refresh">↺</button>
      </div>
      <div class="payment-list" id="payment-list">
        <div class="pay-empty">Select a trip to see payments</div>
      </div>
    </div>

  </div>

  <!-- ══════════ SCREEN: TRIPS ══════════ -->
  <div id="screen-trips" class="screen">
    <div class="section-lbl">// ACTIVE JOURNEYS</div>
    <div class="trip-list" id="trip-list"></div>
    <button class="new-mission-btn" id="new-mission-btn">+ NEW JOURNEY</button>
    <div id="trip-form-wrap"></div>
  </div>

  <!-- ══════════ SCREEN: EXPLORE ══════════ -->
  <div id="screen-explore" class="screen">
    <div class="section-lbl">// EXPLORE</div>

    <div class="recs-section">
      <div class="recs-hdr">
        <div class="recs-hdr-left">
          <span class="recs-hdr-lbl">AI NEARBY</span>
          <span class="recs-geo-note" id="recs-geo-note" style="display:none"></span>
        </div>
        <button class="refresh-btn" id="recs-refresh-btn" title="Get AI recommendations">↺</button>
      </div>
      <div id="recs-list">
        <button class="events-find-btn" onclick="loadRecommendations()">⊕ GET AI RECOMMENDATIONS</button>
      </div>
    </div>

    <div class="events-section">
      <div class="events-hdr">
        <span class="events-hdr-lbl">Events Nearby</span>
        <button class="refresh-btn" id="events-refresh-btn" title="Find events">↺</button>
      </div>
      <div class="events-list" id="events-list">
        <button class="events-find-btn" id="events-find-btn" onclick="loadEvents()">+ Find local events</button>
      </div>
    </div>

  </div>

  <!-- ══════════ SCREEN: TRIPS ══════════ -->
  <div id="screen-trips" class="screen">
    <div class="section-lbl">Your Trips</div>
    <div class="trip-list" id="trip-list"></div>
    <button class="new-mission-btn" id="new-mission-btn">+ New Trip</button>
    <div id="trip-form-wrap"></div>
  </div>

  <!-- ══════════ BOTTOM NAV ══════════ -->
  <nav id="nav">
    <button class="nav-tab active" data-screen="scanner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3m9-16h3a1 1 0 011 1v3m0 9v3a1 1 0 01-1 1h-3"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Scan
    </button>
    <button class="nav-tab" data-screen="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 7v5l3.5 3.5"/>
      </svg>
      Journey
    </button>
    <button class="nav-tab" data-screen="explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
      </svg>
      EXPLORE
    </button>
    <button class="nav-tab" data-screen="trips">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 17l9-13 9 13H3z"/>
        <path d="M12 4v3M9 17v2M15 17v2"/>
      </svg>
      Trips
    </button>
  </nav>

</div><!-- #app -->

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const S = {
  activeTrip: null,
  trips: [],
  scanMode: 'photo',
  selectedFile: null,
  dash: null,      // cached dashboard data for currency toggle
  destRate: null,  // EUR→destCcy multiplier (1/totalEur for 1 destCcy unit)
};

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(t => {
  t.addEventListener('click', () => showScreen(t.dataset.screen));
});

function showScreen(name) {
  if (name !== 'scanner') stopCamera();
  document.querySelectorAll('.screen').forEach(s =>
    s.classList.toggle('active', s.id === `screen-${name}`)
  );
  document.querySelectorAll('.nav-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.screen === name)
  );
  if (name === 'dashboard') loadDashboard();
  if (name === 'trips')     loadTrips();
  if (name === 'explore')   loadExplore();
  if (name === 'scanner' && (S.scanMode === 'photo' || S.scanMode === 'menu') && cameraState === 'idle') {
    startCamera();
  }
}

/* ══════════════════════════════════════════════════════════
   SCANNER
══════════════════════════════════════════════════════════ */
const fileInput     = document.getElementById('file-input');
const cameraVideo   = document.getElementById('camera-video');
const vfStatus      = document.getElementById('vf-status');
const vfPreview     = document.getElementById('vf-preview');
const viewfinder    = document.getElementById('viewfinder');
const scanBtn       = document.getElementById('scan-btn');
const uploadAltBtn  = document.getElementById('upload-alt-btn');
const resultArea    = document.getElementById('result-area');

uploadAltBtn.addEventListener('click', () => {
  fileInput.removeAttribute('hidden');
  fileInput.click();
});

// Camera state: 'idle' | 'live' | 'captured'
let cameraState  = 'idle';
let cameraStream = null;

// Voice state: 'idle' | 'recording' | 'processing'
let voiceState    = 'idle';
let mediaRecorder = null;
let audioChunks   = [];
let recTimer      = null;
let recSecs       = 0;
let audioCtx      = null;
let analyser      = null;
let animFrame     = null;

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.scanMode = tab.dataset.mode;
    resetScan();
    applyMode(S.scanMode);
  });
});

function applyMode(mode) {
  if (mode === 'voice') {
    uploadAltBtn.style.display = 'none';
    fileInput.setAttribute('hidden', '');
    vfPreview.innerHTML = `
      <div class="vf-voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/>
        </svg>
      </div>`;
    vfStatus.textContent = 'Ready to record';
    scanBtn.textContent = 'Start Recording';
  } else {
    // photo or menu — start live camera + show upload fallback
    fileInput.setAttribute('hidden', '');
    uploadAltBtn.style.display = '';
    startCamera();
  }
}

async function startCamera() {
  cameraState = 'idle';
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    cameraVideo.srcObject = cameraStream;
    cameraVideo.classList.add('live');
    cameraState = 'live';
    vfStatus.textContent = '';
    scanBtn.textContent = S.scanMode === 'menu' ? 'Capture Menu' : 'Capture';
  } catch (err) {
    // Camera denied or unavailable — fall back to file picker
    cameraVideo.classList.remove('live');
    fileInput.removeAttribute('hidden');
    vfStatus.textContent = 'Camera unavailable — select file';
    scanBtn.textContent = S.scanMode === 'menu' ? 'Select Menu Image' : 'Select Image';
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  cameraVideo.srcObject = null;
  cameraVideo.classList.remove('live');
  cameraState = 'idle';
}

function captureFrame() {
  const canvas = document.createElement('canvas');
  canvas.width  = cameraVideo.videoWidth  || 1280;
  canvas.height = cameraVideo.videoHeight || 720;
  canvas.getContext('2d').drawImage(cameraVideo, 0, 0);
  stopCamera();
  canvas.toBlob(blob => {
    S.selectedFile = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
    const url = URL.createObjectURL(blob);
    vfPreview.innerHTML = `<img src="${url}" alt="capture">`;
    viewfinder.classList.add('has-file');
    cameraState = 'captured';
    vfStatus.textContent = 'Price detected';
    scanBtn.textContent = S.scanMode === 'menu' ? 'Read Menu' : 'Scan Price';
  }, 'image/jpeg', 0.92);
}

// Upload mode: file picker handler
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  S.selectedFile = file;
  stopCamera();
  cameraState = 'captured';
  const url = URL.createObjectURL(file);
  vfPreview.innerHTML = `<img src="${url}" alt="preview" style="opacity:1">`;
  vfStatus.textContent = 'Price detected';
  vfStatus.classList.add('live');
  viewfinder.classList.add('has-file');
  scanBtn.textContent = 'Scan Price';
});

scanBtn.addEventListener('click', async () => {
  if (S.scanMode === 'voice') {
    if (voiceState === 'idle')      startRecording();
    else if (voiceState === 'recording') stopRecording();
    return;
  }
  if (cameraState === 'live') {
    captureFrame();
    return;
  }
  if (cameraState === 'captured' && S.selectedFile) {
    await performScan();
    return;
  }
  // Fallback: no camera, no file — open picker
  fileInput.removeAttribute('hidden');
  fileInput.click();
});

async function performScan() {
  const file = S.selectedFile;
  if (!file) return;

  const label = S.scanMode === 'menu' ? 'Read Menu' : 'Scan Price';
  scanBtn.textContent = 'Reading...';
  scanBtn.classList.add('amber');
  scanBtn.disabled = true;
  resultArea.innerHTML = '';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('payment_type', 'card');

  const endpoint = S.scanMode === 'menu' ? '/api/menu' : '/api/scan';

  try {
    const res = await fetch(endpoint, { method: 'POST', body: fd });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    if (S.scanMode === 'menu') renderMenuResult(data);
    else renderScanResult(data);
  } catch (err) {
    resultArea.innerHTML = `<div class="error-panel">Scan failed: ${esc(err.message)}</div>`;
  } finally {
    scanBtn.textContent = label;
    scanBtn.classList.remove('amber');
    scanBtn.disabled = false;
  }
}

function renderScanResult(d) {
  const badge = d.payment_type === 'card' ? '💳 Card' : '🏦 Wire';
  resultArea.innerHTML = `
    <div class="result-panel">
      <div class="result-original">${esc(String(d.input_amount))} ${esc(d.input_currency)}</div>
      <div class="result-eur">€ ${fmt2(d.total_eur)}</div>
      <div class="result-meta">+€${fmt4(d.total_fees)} fees · ${esc(d.source || '')}</div>
      <span class="result-badge">${badge}</span>
      <button class="ghost-btn full" onclick="resetScan()">New Scan</button>
    </div>`;
}

function renderMenuResult(d) {
  if (!d.items || d.items.length === 0) {
    resultArea.innerHTML = `<div class="error-panel">No menu items detected</div>`;
    return;
  }
  const rows = d.items.map(item => `
    <tr>
      <td><div class="td-name">${esc(item.translated_name)}</div>
          <div class="td-orig">${esc(item.original_name)}</div></td>
      <td class="td-price">${esc(item.original_price || '—')}</td>
      <td class="td-eur">${item.eur != null ? '€' + fmt2(item.eur) : '—'}</td>
    </tr>`).join('');

  resultArea.innerHTML = `
    <div class="menu-panel">
      <div class="menu-panel-header">
        Menu Scan · <span>${d.items.length} items</span> · ${esc(d.currency_iso || '—')}
      </div>
      <table class="menu-table">
        <thead><tr><th>Item</th><th>Price</th><th>EUR</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="ghost-btn full" onclick="resetScan()">New Scan</button>`;
}

function resetScan() {
  S.selectedFile = null;
  fileInput.value = '';
  vfPreview.innerHTML = '';
  vfStatus.classList.remove('live');
  viewfinder.classList.remove('has-file');
  resultArea.innerHTML = '';
  // Stop any active streams
  clearInterval(recTimer);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  stopCamera();
  // Restart for camera modes; re-draw mic UI for voice
  uploadAltBtn.style.display = (S.scanMode === 'photo' || S.scanMode === 'menu') ? '' : 'none';
  if (S.scanMode === 'photo' || S.scanMode === 'menu') {
    startCamera();
  } else if (S.scanMode === 'voice') {
    resetVoice(true);
  } else {
    vfStatus.textContent = 'Ready';
  }
}

/* ══════════════════════════════════════════════════════════
   VOICE
══════════════════════════════════════════════════════════ */
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4']
      .find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mimeType });
      submitVoice(blob, mimeType);
    };

    mediaRecorder.start(200);
    voiceState = 'recording';
    recSecs = 0;

    vfStatus.textContent = 'REC 00:00';
    vfStatus.classList.add('live');

    // Build waveform canvas + overlay
    vfPreview.innerHTML = `
      <div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
        <canvas id="wave-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
        <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;">
          <div class="rec-dot"></div>
          <div class="rec-timer" id="rec-timer">00:00</div>
        </div>
      </div>`;

    // Wire up Web Audio analyser
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);

    const canvas = document.getElementById('wave-canvas');
    canvas.width  = canvas.offsetWidth  || 300;
    canvas.height = canvas.offsetHeight || 200;
    const wCtx   = canvas.getContext('2d');
    const bufLen  = analyser.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);

    function drawWaveform() {
      animFrame = requestAnimationFrame(drawWaveform);
      analyser.getByteTimeDomainData(dataArr);
      wCtx.clearRect(0, 0, canvas.width, canvas.height);
      wCtx.lineWidth   = 2;
      wCtx.strokeStyle = 'rgba(0,217,134,0.85)';
      wCtx.shadowBlur  = 8;
      wCtx.shadowColor = 'rgba(0,217,134,0.6)';
      wCtx.beginPath();
      const sliceW = canvas.width / bufLen;
      let x = 0;
      for (let i = 0; i < bufLen; i++) {
        const v = dataArr[i] / 128;
        const y = (v * canvas.height) / 2;
        i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
        x += sliceW;
      }
      wCtx.lineTo(canvas.width, canvas.height / 2);
      wCtx.stroke();
    }
    drawWaveform();

    scanBtn.textContent = 'Stop';

    recTimer = setInterval(() => {
      recSecs++;
      const mm = String(Math.floor(recSecs / 60)).padStart(2, '0');
      const ss = String(recSecs % 60).padStart(2, '0');
      const t = document.getElementById('rec-timer');
      if (t) t.textContent = `${mm}:${ss}`;
      vfStatus.textContent = `REC ${mm}:${ss}`;
    }, 1000);

  } catch (err) {
    vfStatus.textContent = 'Mic unavailable';
    vfStatus.classList.remove('live');
  }
}

function stopRecording() {
  clearInterval(recTimer);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  // Freeze the waveform — cancel draw loop but leave canvas in place
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (audioCtx)  { audioCtx.close(); audioCtx = null; analyser = null; }
  voiceState = 'processing';
  vfStatus.textContent = 'Analysing...';
  // Overlay label on top of the frozen waveform
  const overlay = document.createElement('div');
  overlay.id = 'wave-overlay';
  overlay.style.cssText = 'position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.12em;';
  overlay.textContent = 'ANALYSING AUDIO...';
  const wrapper = vfPreview.querySelector('div');
  if (wrapper) wrapper.appendChild(overlay);
  scanBtn.textContent = 'Reading...';
  scanBtn.disabled = true;
}

async function submitVoice(blob, mimeType) {
  const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
  const fd = new FormData();
  fd.append('file', new File([blob], `voice.${ext}`, { type: mimeType }));
  fd.append('payment_type', 'card');

  try {
    const res = await fetch('/api/voice', { method: 'POST', body: fd });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();

    if (data.status === 'no_amount') {
      resultArea.innerHTML = `
        <div class="error-panel">No amount detected
          ${data.transcript ? `<br><span style="opacity:.7;font-size:11px">"${esc(data.transcript)}"</span>` : ''}
        </div>`;
      resetVoice();
    } else if (data.status === 'needs_currency') {
      showCurrencyPicker(data);
    } else {
      if (data.transcript) {
        resultArea.innerHTML = `<div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);padding:4px 2px;letter-spacing:.06em">"${esc(data.transcript)}"</div>`;
      }
      renderScanResult({
        input_amount: data.amount, input_currency: data.currency,
        total_eur: data.total_eur, total_fees: data.total_fees,
        source: data.source, payment_type: data.payment_type,
      });
      resetVoice(false); // reset controls but keep result
    }
  } catch (err) {
    resultArea.innerHTML = `<div class="error-panel">Scan failed: ${esc(err.message)}</div>`;
    resetVoice();
  }
}

function showCurrencyPicker(data) {
  resultArea.innerHTML = `
    <div class="ccy-picker">
      <div class="ccy-picker-transcript">"${esc(data.transcript || '')}"</div>
      <div class="ccy-picker-label">Detected Amount</div>
      <div class="ccy-picker-amount">${esc(String(data.amount))}</div>
      <div class="ccy-picker-label">Currency not detected — enter below</div>
      <div class="ccy-picker-row">
        <input class="rf-input" id="voice-ccy" placeholder="e.g. JPY" maxlength="3"
               style="text-transform:uppercase">
        <button class="cta-btn" style="width:auto;padding:10px 18px;font-size:13px"
                onclick="convertVoice(${data.amount})">Convert</button>
      </div>
    </div>`;
  resetVoice(false);
}

async function convertVoice(amount) {
  const ccy = (document.getElementById('voice-ccy').value || '').trim().toUpperCase();
  if (!ccy || ccy.length !== 3) { alert('Enter a 3-letter currency code'); return; }
  try {
    const res = await fetch('/api/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount, currency: ccy, payment_type: 'card' }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const fx = await res.json();
    renderScanResult({
      input_amount: amount, input_currency: ccy,
      total_eur: fx.total_eur, total_fees: fx.total_fees,
      source: fx.source, payment_type: fx.payment_type,
    });
  } catch (err) {
    alert('Conversion failed: ' + err.message);
  }
}

function resetVoice(resetUI = true) {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (audioCtx)  { audioCtx.close(); audioCtx = null; analyser = null; }
  voiceState = 'idle';
  scanBtn.disabled = false;
  scanBtn.textContent = 'Start Recording';
  if (resetUI) {
    vfStatus.textContent = 'Ready to record';
    vfStatus.classList.remove('live');
    vfPreview.innerHTML = `
      <div class="vf-voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/>
        </svg>
      </div>`;
    resultArea.innerHTML = '';
  }
}

const CIRC = 2 * Math.PI * 78; // ≈ 490.09

async function loadDashboard() {
  if (!S.activeTrip) {
    document.getElementById('mission-name').textContent = 'None selected';
    setGauge(0, 0, 1, 'EUR');
    document.getElementById('stat-budget').textContent = '—';
    document.getElementById('stat-per-day').textContent = '—';
    document.getElementById('payment-list').innerHTML =
      '<div class="pay-empty">Select a trip to see payments</div>';
    document.getElementById('ccy-toggle').style.display = 'none';
    document.getElementById('ccy-rate').style.display = 'none';
    return;
  }

  const trip = S.activeTrip;
  document.getElementById('mission-name').textContent = trip.name;
  document.getElementById('payment-list').innerHTML =
    '<div class="pay-empty">Loading...</div>';

  try {
    const res = await fetch(`/api/trips/${trip.id}/dashboard`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    const spent     = d.spent || 0;
    const remaining = trip.budget_eur - spent;
    const ownCcy    = d.own_ccy || 'EUR';
    const destCcy   = (trip.default_currency && trip.default_currency !== ownCcy)
                        ? trip.default_currency : null;
    const daysLeft  = trip.end_date
      ? Math.max(1, Math.ceil((new Date(trip.end_date) - new Date()) / 86400000))
      : null;

    S.dash = { remaining, budget: trip.budget_eur, ownCcy, destCcy, payments: d.payments || [], daysLeft };
    S.destRate = null; // reset rate cache on fresh load

    // Reset toggle to home-currency side
    document.getElementById('ccy-own-btn').classList.add('active');
    document.getElementById('ccy-dest-btn').classList.remove('active');

    const toggle = document.getElementById('ccy-toggle');
    if (destCcy) {
      document.getElementById('ccy-own-btn').textContent = ownCcy;
      document.getElementById('ccy-dest-btn').textContent = destCcy;
      toggle.style.display = 'flex';
    } else {
      toggle.style.display = 'none';
    }

    // Pre-fetch rate automatically — populates S.destRate and shows rate label
    document.getElementById('ccy-rate').style.display = 'none';
    if (destCcy) fetchDestRate(destCcy);

    applyDashCurrency(false);
  } catch (err) {
    document.getElementById('payment-list').innerHTML =
      `<div class="pay-empty">Error: ${esc(err.message)}</div>`;
  }
}

function setGauge(pct, remaining, total, ccy) {
  const arc = document.getElementById('g-arc');
  arc.style.strokeDashoffset = CIRC * (1 - pct);
  const color = pct > .6 ? 'var(--accent)' : pct > .3 ? 'var(--amber)' : 'var(--red)';
  const glow  = pct > .6 ? '#00d986'        : pct > .3 ? '#ffb347'       : '#ff4757';
  arc.style.stroke = color;
  arc.style.filter = `drop-shadow(0 0 6px ${glow})`;
  document.getElementById('gauge-pct').textContent = `${Math.round(pct * 100)}%`;
  const amtLabel = (!ccy || ccy === 'EUR') ? `€${fmt2(remaining)}` : `${fmt2(remaining)} ${ccy}`;
  document.getElementById('gauge-amt').textContent = amtLabel;
  document.getElementById('gauge-amt').style.color = color;
}

// ── Currency toggle ────────────────────────────────────────────────────────────

document.getElementById('ccy-own-btn').addEventListener('click', () => {
  if (!S.dash) return;
  document.getElementById('ccy-own-btn').classList.add('active');
  document.getElementById('ccy-dest-btn').classList.remove('active');
  applyDashCurrency(false);
});

document.getElementById('ccy-dest-btn').addEventListener('click', async () => {
  if (!S.dash) return;
  document.getElementById('ccy-dest-btn').classList.add('active');
  document.getElementById('ccy-own-btn').classList.remove('active');
  await applyDashCurrency(true);
});

async function applyDashCurrency(useDestCcy) {
  const ds = S.dash;
  if (!ds) return;
  const { remaining, budget, ownCcy, destCcy, payments, daysLeft } = ds;

  if (!useDestCcy || !destCcy) {
    const pct = Math.max(0, Math.min(1, remaining / budget));
    setGauge(pct, remaining, budget, ownCcy);
    document.getElementById('stat-budget').textContent = `${ownCcy} ${fmt2(budget)}`;
    document.getElementById('stat-per-day').textContent =
      daysLeft ? `${ownCcy} ${fmt2(remaining / daysLeft)}` : '—';
    renderPayments(payments, ownCcy);
    return;
  }

  // Fetch EUR→destCcy rate lazily (convert 1 destCcy → EUR, then invert)
  if (!S.destRate) {
    try {
      const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 1.0, currency: destCcy, payment_type: 'card' }),
      });
      if (res.ok) {
        const fx = await res.json();
        S.destRate = fx.total_eur > 0 ? 1.0 / fx.total_eur : 1;
      }
    } catch { S.destRate = 1; }
  }

  const rate = S.destRate || 1;
  const remD   = remaining * rate;
  const budgetD = budget * rate;
  const pct    = Math.max(0, Math.min(1, remD / budgetD));
  setGauge(pct, remD, budgetD, destCcy);
  document.getElementById('stat-budget').textContent = `${destCcy} ${fmt2(budgetD)}`;
  document.getElementById('stat-per-day').textContent =
    daysLeft ? `${destCcy} ${fmt2(remD / daysLeft)}` : '—';

  // Convert payment amounts by the same rate
  const converted = payments.map(p => ({ ...p, amount: parseFloat(p.amount) * rate }));
  renderPayments(converted, destCcy);
}

async function fetchRecsGeoHint() {
  try {
    const res = await fetch('/api/geo');
    if (!res.ok) return;
    const d = await res.json();
    const el = document.getElementById('recs-geo-note');
    if (!el) return;
    const loc = [d.city, d.country_name].filter(Boolean).join(', ');
    if (loc) { el.textContent = `loc: ${loc}`; el.style.display = ''; }
    else if (d.country_name) { el.textContent = `loc: ${d.country_name}`; el.style.display = ''; }
  } catch { /* silent */ }
}

async function fetchDestRate(destCcy) {
  try {
    const res = await fetch('/api/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: 1.0, currency: destCcy, payment_type: 'card' }),
    });
    if (!res.ok) return;
    const fx = await res.json();
    if (fx.total_eur > 0) {
      S.destRate = 1.0 / fx.total_eur;
      const el = document.getElementById('ccy-rate');
      // Only show if this destCcy still matches the loaded trip
      if (el && S.dash && S.dash.destCcy === destCcy) {
        el.textContent = `1 EUR ≈ ${fmt2(S.destRate)} ${destCcy}`;
        el.style.display = '';
      }
    }
  } catch { /* silent — rate display stays hidden */ }
}

function renderPayments(payments, ccy) {
  const list = document.getElementById('payment-list');
  if (!payments.length) {
    list.innerHTML = '<div class="pay-empty">No payments found</div>';
    return;
  }
  list.innerHTML = payments.slice(0, 100).map(p => {
    const isDb = p.type === 'debit';
    const amt  = Math.abs(parseFloat(p.amount));
    const sign = isDb ? '−' : '+';
    const cls  = isDb ? 'db' : 'cr';
    const date = fmtDate(p.date);
    const desc = esc((p.description || p.counterparty || '—').slice(0, 32));
    return `<div class="pay-row">
      <span class="pay-date">${date}</span>
      <span class="pay-desc">${desc}</span>
      <span class="pay-amt ${cls}">${sign}${ccy} ${fmt2(amt)}</span>
    </div>`;
  }).join('');
}

function renderRecommendations(recs) {

    list.innerHTML = '<div class="events-empty">NO RECOMMENDATIONS FOUND</div>';
    return;
  }

    const dist  = r.distance_m != null ? `${Math.round(r.distance_m)}m away` : '';
    const stars = r.rating != null ? `★ ${r.rating}` : '';
    const price = r.price_level_label || '';
    const meta  = [r.category, stars, price].filter(Boolean).join(' · ');

        ${dist ? `<span class="rec-dist">${esc(dist)}</span>` : ''}

async function loadEvents() {
  const list = document.getElementById('events-list');
  list.innerHTML = '<div class="events-empty">Scanning nearby...</div>';
  try {
    const res = await fetch('/api/events?radius=25&size=8');
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    renderEvents(data.events || []);
  } catch (err) {
    list.innerHTML = `<div class="events-empty">${esc(err.message)}</div>`;
  }
}

function renderEvents(events) {
  const list = document.getElementById('events-list');
  if (!events.length) {
    list.innerHTML = '<div class="events-empty">No events found nearby</div>';
    return;
  }
  list.innerHTML = events.map(ev => {
    const date = ev.date ? fmtDate(ev.date) : '—';
    const time = ev.time ? ev.time.slice(0, 5) : '';
    const when = time ? `${date} · ${time}` : date;
    const cat  = ev.category ? `[${esc(ev.category.toUpperCase())}] ` : '';
    const price = ev.price_min != null
      ? `€${fmt2(ev.price_min)}${ev.price_max != null && ev.price_max !== ev.price_min ? '–€' + fmt2(ev.price_max) : ''}`
      : '';
    const imgEl = ev.image
      ? `<img class="event-img" src="${esc(ev.image)}" alt="" loading="lazy">`
      : `<div class="event-img-placeholder">🎟</div>`;

    return `<a class="event-card" href="${esc(ev.url || '#')}" target="_blank" rel="noopener">
      ${imgEl}
      <div class="event-info">
        <div class="event-name">${cat}${esc(ev.name)}</div>
        <div class="event-meta">${when}</div>
        <div class="event-venue">${esc(ev.venue || ev.city || '')}</div>
      </div>
      ${price ? `<div class="event-price">${price}</div>` : ''}
    </a>`;
  }).join('');
}

function renderTripList() {
  const el = document.getElementById('trip-list');
  if (!S.trips.length) {
    el.innerHTML = '<div class="pay-empty">No trips yet — create one below</div>';
    return;
  }
  el.innerHTML = S.trips.map(trip => {
    const active = S.activeTrip && S.activeTrip.id === trip.id;
    const dates  = trip.start_date
      ? `${trip.start_date} → ${trip.end_date || '?'}`
      : 'Open-ended';
    return `<div class="trip-card ${active ? 'active' : ''}" data-id="${trip.id}">
      <div class="trip-card-name">${esc(trip.name)}</div>
      <div class="trip-card-meta">${dates}</div>
      <div class="trip-card-budget">€${fmt2(trip.budget_eur)}</div>
      ${active ? '<div class="trip-active-pill">Active</div>' : ''}
    </div>`;
  }).join('');

  el.querySelectorAll('.trip-card').forEach(card => {
    card.addEventListener('click', () => {
      const trip = S.trips.find(t => t.id === card.dataset.id);
      if (!trip) return;
      S.activeTrip = trip;
      document.getElementById('header-trip').textContent = trip.name;
      renderTripList();
    });
  });
}

async function saveTrip() {
  const name   = document.getElementById('tf-name').value.trim();
  const budget = parseFloat(document.getElementById('tf-budget').value);
  const start  = document.getElementById('tf-start').value || null;
  const end    = document.getElementById('tf-end').value   || null;
  const ccy    = (document.getElementById('tf-ccy').value || '').trim().toUpperCase() || null;

  if (!name || isNaN(budget) || budget <= 0) {
    alert('Trip name and budget are required');
    return;
  }
  if (start && end && end < start) {
    alert('Return date must be after departure');
    return;
  }
  try {
    const res = await fetch('/api/trips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, budget_eur: budget, start_date: start, end_date: end, default_currency: ccy }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const trip = await res.json();
    S.trips.push(trip);
    S.activeTrip = trip;
    document.getElementById('header-trip').textContent = trip.name;
    document.getElementById('trip-form-wrap').innerHTML = '';
    renderTripList();
  } catch (err) {
    alert('Creation failed: ' + err.message);
  }
}

/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
function fmt2(n) { return parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt4(n) { return parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:4,maximumFractionDigits:4}); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) {
  try { return new Date(s).toLocaleDateString('en',{month:'short',day:'2-digit'}).toUpperCase(); }
  catch { return s||'—'; }
}
